---
- name: Configure local Kubernetes
  hosts: kubernetes
  connection: local
  tasks:
    - name: Create namespace
      command: kubectl create namespace foodsave --dry-run=client -o yaml | kubectl apply -f -
      register: result
      changed_when: "'created' in result.stderr"

    - name: Deploy PostgreSQL
      command: kubectl apply -f kubernetes/postgres/deployment.yaml
      args:
        chdir: ~/projects/foodsave-app

    - name: Deploy MongoDB
      command: kubectl apply -f kubernetes/mongodb/deployment.yaml
      args:
        chdir: ~/projects/foodsave-app

    - name: Deploy user-service
      command: kubectl apply -f kubernetes/user-service/deployment.yaml
      args:
        chdir: ~/projects/foodsave-app

    - name: Deploy donation-service
      command: kubectl apply -f kubernetes/donation-service/deployment.yaml
      args:
        chdir: ~/projects/foodsave-app

    - name: Deploy notification-service
      command: kubectl apply -f kubernetes/notification-service/deployment.yaml
      args:
        chdir: ~/projects/foodsave-app

    - name: Deploy matching-service
      command: kubectl apply -f kubernetes/matching-service/deployment.yaml
      args:
        chdir: ~/projects/foodsave-app

    - name: Deploy frontend
      command: kubectl apply -f kubernetes/frontend/deployment.yaml
      args:
        chdir: ~/projects/foodsave-app

    - name: Wait for all pods
      command: kubectl wait --for=condition=ready pods --all -n foodsave --timeout=300s
      register: result
      ignore_errors: yes

    - name: Show deployment status
      debug:
        msg: "All services deployed successfully!"
